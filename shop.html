<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Boutique - Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fff0f6,#fde2ec,#fce4ec);
    color:#222;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    width:140px;
}

.nav{
    display:flex;
    gap:25px;
}

.nav a{
    text-decoration:none;
    color:#b03060;
    font-weight:500;
}

.nav a:hover{
    color:#d63384;
}

.cart-btn{
    background:linear-gradient(135deg,#d63384,#b03060);
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:25px;
    cursor:pointer;
    font-weight:500;
}

/* SEARCH */
.search-box{
    text-align:center;
    margin:25px;
}

.search-box input{
    width:350px;
    max-width:90%;
    padding:12px 18px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* TITLES */
h2{
    text-align:center;
    margin-top:30px;
    margin-bottom:15px;
    color:#b03060;
    font-family:'Playfair Display',serif;
    font-size:32px;
}

/* PRODUCTS */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:20px;
}

.card{
    width:260px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:18px;
    box-shadow:0 12px 25px rgba(0,0,0,0.08);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:18px;
}

.card h3{
    margin-top:16px;
    font-size:28px;
    font-weight:600;
}

.price{
    color:#d63384;
    font-size:28px;
    font-weight:700;
    margin:15px 0;
}

.card-controls{
    display:flex;
    gap:10px;
    justify-content:center;
    align-items:center;
}

.card input{
    width:80px;
    padding:10px;
    border-radius:12px;
    border:1px solid #ddd;
    text-align:center;
}

.btn{
    padding:10px 18px;
    border:none;
    background:linear-gradient(135deg,#d63384,#b03060);
    color:white;
    border-radius:25px;
    cursor:pointer;
    font-weight:500;
    transition:all 0.3s ease;
    box-shadow:0 8px 18px rgba(214,51,132,0.25);
}
.btn:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 14px 24px rgba(214,51,132,0.35);
}
.btn:active{
    transform:scale(0.95);
}

/* TOAST */
#toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#d63384;
    color:white;
    padding:12px 20px;
    border-radius:30px;
    opacity:0;
    transition:0.4s;
}

#toast.show{
    opacity:1;
}

/* CART DRAWER */
.drawer{
    position:fixed;
    top:0;
    right:-350px;
    width:320px;
    height:100%;
    background:white;
    box-shadow:-8px 0 25px rgba(0,0,0,0.1);
    transition:0.4s;
    padding:20px;
    z-index:1000;
    overflow-y:auto;
}

.drawer.open{
    right:0;
}

.drawer-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.drawer-header h3{
    color:#b03060;
}

.drawer-header span{
    cursor:pointer;
    font-size:22px;
}

.cart-item{
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.qty-btn{
    padding:3px 8px;
    border:none;
    background:#d63384;
    color:white;
    border-radius:8px;
    margin:0 4px;
    cursor:pointer;
}

#total{
    margin-top:15px;
    font-weight:700;
    color:#b03060;
}

.checkout{
    width:100%;
    margin-top:15px;
}

/* MOBILE */
@media(max-width:768px){
.header{
    flex-direction:column;
    gap:15px;
}
.nav{
    gap:15px;
}
}
</style>
</head>

<body>

<header class="header">
    <img src="images/logo.jpeg" class="logo">

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
    </div>

    <button class="cart-btn" onclick="toggleCart()">
        🛒 Your Cart (<span id="count">0</span>)
    </button>
</header>

<div class="search-box">
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<h2>🌷 Bouquets</h2>

<section class="products">

<div class="card">
    <img src="images/luxury.jpg">
    <h3>Satin Bouquet</h3>
    <p class="price">₹899</p>

    <div class="card-controls">
        <input type="number" value="1" min="1" id="q1">
        <button class="btn" onclick="addToCart('Satin Bouquet',899,'q1')">Add</button>
    </div>
</div>

<div class="card">
    <img src="images/lily.jpg" alt="Lily Bouquet">

    <h3>Lily Bouquet</h3>

    <p class="price">₹999</p>

    <div class="card-controls">
        <input type="number" value="1" min="1" id="q2">

        <button class="btn" onclick="addToCart('Lily Bouquet',999,'q2')">
            Add
        </button>
    </div>
</div>
</section>

<h2>🌸 Flowers</h2>

<section class="products">

<div class="card">
    <img src="images/pink.jpg">
    <h3>Pink Satin Flower</h3>
    <p class="price">₹499</p>

    <div class="card-controls">
        <input type="number" value="1" min="1" id="q3">
        <button class="btn" onclick="addToCart('Pink Satin Flower',499,'q3')">Add</button>
    </div>
</div>

</section>

<div id="toast"></div>

<!-- CART DRAWER -->
<div class="drawer" id="cartDrawer">

<div class="drawer-header">
<h3>Your Cart</h3>
<span onclick="toggleCart()">✖</span>
</div>

<div id="cartItems"></div>

<p id="total"></p>

<button class="btn checkout" onclick="checkout()">Checkout</button>

</div>

<script>
const products = [
"Satin Bouquet",
"Lily Bouquet",
"Pink Satin Flower"
];

function getCart(){
return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
localStorage.setItem("cart",JSON.stringify(cart));
}

function updateCount(){
document.getElementById("count").innerText = getCart().length;
}

function addToCart(name,price,id){
let qty=parseInt(document.getElementById(id).value);
let cart=getCart();

cart.push({
name:name,
price:price,
qty:qty
});

saveCart(cart);
updateCount();
showToast(name + " added to cart");
}

function showToast(msg){
let toast=document.getElementById("toast");
toast.innerText=msg;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);
}

function toggleCart(){
document.getElementById("cartDrawer").classList.toggle("open");
displayCart();
}

function displayCart(){
let cart=getCart();
let items=document.getElementById("cartItems");
let total=0;

items.innerHTML="";

cart.forEach((item,index)=>{
items.innerHTML += `
<div class="cart-item">
<b>${item.name}</b><br>
<button class="qty-btn" onclick="changeQty(${index},-1)">-</button>
${item.qty}
<button class="qty-btn" onclick="changeQty(${index},1)">+</button>
₹${item.price * item.qty}
<span onclick="removeItem(${index})" style="cursor:pointer;">❌</span>
</div>
`;
total += item.price * item.qty;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

function changeQty(index,val){
let cart=getCart();
cart[index].qty += val;

if(cart[index].qty <=0){
cart.splice(index,1);
}

saveCart(cart);
displayCart();
updateCount();
}

function removeItem(index){
let cart=getCart();
cart.splice(index,1);
saveCart(cart);
displayCart();
updateCount();
}

function checkout(){
let cart=getCart();

if(cart.length==0){
showToast("Cart is empty");
return;
}

let msg="Hi, I want to order:%0A%0A";
let total=0;

cart.forEach(item=>{
msg += item.name + " x" + item.qty + "%0A";
total += item.price * item.qty;
});

msg += "%0ATotal: ₹" + total;

window.open("https://wa.me/91XXXXXXXXXX?text="+msg);
}

function searchProducts(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let text=card.innerText.toLowerCase();

if(text.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

window.onload=updateCount;
</script>

</body>
</html>
